[build]
  command = "npm run build"
  publish = "dist"

# www → non-www is handled by Netlify automatically when tslaquant.com is set as primary domain
# in Netlify Dashboard → Domain Settings. No redirect rule needed here.

[build.environment]
  NODE_VERSION = "22"

# Stripe success redirects — set these as success_url in Stripe Dashboard per Payment Link
[[redirects]]
  from = "/success/single"
  to = "/?upgrade=single"
  status = 301

[[redirects]]
  from = "/success/trader"
  to = "/?upgrade=active_trader"
  status = 301

[[redirects]]
  from = "/success/institutional"
  to = "/?upgrade=institutional"
  status = 301

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
